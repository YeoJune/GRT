_base_: "../../configs/base.yaml"

model:
  segment_len: 64
  num_registers: 32
  d_model: 256
  vocab_size: 50257
  alu:
    num_layers: 4
    nhead: 4
    d_ff: 1024

data:
  tokenizer: "gpt2"
  task: "in_context_arithmetic"
  seq_len: 256
  num_equations: 24
  num_queries: 4

training:
  batch_size: 8
  max_steps: 5000
  mixed_precision: "fp16"

rtla:
  enabled: true
  trace_every_n_steps: 500
  output_dir: "traces/"
  float_dtype: "float32"
  upload_panels: true
  upload_table: true

logging:
  save_dir: "checkpoints/"
  save_every_n_steps: 1000
  eval_every_n_steps: 500

wandb:
  enabled: true
  project: "grt-research"
  run_name: "toy-arithmetic-standard"
  group: "toy-arithmetic"
  tags: ["phase1", "toy-arithmetic"]
  notes: "Synthetic in-context arithmetic sanity task"
  log_freq: 50
  watch_model: false
  save_code: true
  checkpoint_artifact: true
