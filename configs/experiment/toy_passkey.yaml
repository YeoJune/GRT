_base_: "../../configs/base.yaml"

model:
  segment_len: 64
  num_registers: 32
  d_model: 256
  vocab_size: 50257
  alu:
    num_layers: 4
    nhead: 4
    d_ff: 1024

data:
  tokenizer: "gpt2"
  task: "passkey_retrieval"
  seq_len: 256
  num_facts: 8
  num_queries: 4
  noise_token_fraction: 0.7

training:
  batch_size: 32
  max_steps: 5000
  mixed_precision: "fp16"

rtla:
  enabled: true
  trace_every_n_steps: 500
  output_dir: "traces/"
  float_dtype: "float32"
  upload_panels: true
  upload_table: true

logging:
  save_dir: "checkpoints/"
  save_every_n_steps: 1000
  eval_every_n_steps: 500

wandb:
  enabled: true
  project: "grt-research"
  entity: null
  run_name: "toy-passkey-gpt2-standard"
  tags: ["phase1", "toy-passkey"]
  notes: "Synthetic Phase 1 pretraining / passkey-like sanity task"
  group: "toy-passkey"
  log_freq: 50
  watch_model: false
  save_code: true
  checkpoint_artifact: true
