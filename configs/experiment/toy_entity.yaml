_base_: "../../configs/base.yaml"

model:
  segment_len: 64
  num_registers: 32
  d_model: 256
  vocab_size: 50257
  alu:
    num_layers: 4
    nhead: 4
    d_ff: 1024

training:
  batch_size: 8
  max_steps: 5000
  mixed_precision: "fp16"

data:
  tokenizer: "gpt2"
  task: "entity_tracking"
  seq_len: 256
  num_entities: 8
  num_updates: 32
  num_queries: 4

rtla:
  enabled: true
  trace_every_n_steps: 500
  output_dir: "traces/"
  float_dtype: "float32"
  upload_panels: true
  upload_table: true

logging:
  save_dir: "checkpoints/"
  save_every_n_steps: 1000
  eval_every_n_steps: 500

wandb:
  enabled: true
  project: "grt-research"
  run_name: "toy-entity-standard"
  group: "toy-entity"
  tags: ["phase1", "toy-entity"]
  notes: "Synthetic entity tracking sanity task"
  log_freq: 50
  watch_model: false
  save_code: true
  checkpoint_artifact: true
